quarkus.log.category."cloud.microservices.catalog.controllers".level=INFO
quarkus.log.category."cloud.microservices.catalog.services".level=INFO
quarkus.log.console.json=true
quarkus.log.console.json.pretty-print=false
quarkus.log.console.json.date-format=yyyy-MM-dd HH:mm:ss.SSS

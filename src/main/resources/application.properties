quarkus.oidc.credentials.secret=${KEYCLOAK_CLIENT_SECRET:catalog-service-secret}
quarkus.oidc.tls.verification=none
quarkus.oidc.token.issuer=https://microservices1691717.westeurope.cloudapp.azure.com/auth/realms/microservices
